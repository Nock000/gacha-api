<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sanctuary Chronicle</title>

  <style>
    body {
      font-family: Georgia, serif;
      max-width: 800px;
      margin: 40px auto;
      padding: 0 20px;
      background: #f7f0df;
      color: #2f2418;
      line-height: 1.6;
    }

    h1 {
      text-align: center;
      font-size: 3rem;
      margin-bottom: 10px;
    }

    .subtitle {
      text-align: center;
      color: #7a6a55;
      margin-bottom: 30px;
      font-size: 1.2rem;
    }

    .entry {
      background: #fff8e7;
      border: 1px solid #d8c7a3;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 24px;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
    }

    .entry-title {
      font-size: 1.8rem;
      font-weight: bold;
      margin-bottom: 12px;
    }

    .entry-text {
      font-size: 1.1rem;
    }

    .footer {
      text-align: center;
      color: #7a6a55;
      margin-top: 40px;
      font-size: 0.95rem;
    }
  </style>
</head>

<body>

  <h1>📜 Sanctuary Chronicle</h1>

  <div class="subtitle">
    A record of notable discoveries and events.
  </div>

  <div class="entry">
    <div class="entry-title">
      📜 Chronicle Opened
    </div>

    <div class="entry-text">
      The Sanctuary Chronicle has been established.
    </div>
  </div>

  <div class="entry">
    <div class="entry-title">
      Coming Soon
    </div>

    <div class="entry-text">
      First discoveries, unlocks, milestones, and special events will be recorded here.
    </div>
  </div>

  <div class="footer">
    The archive is currently empty.
  </div>

</body>
</html>
